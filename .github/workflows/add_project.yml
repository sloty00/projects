name: "System: Add Project Entry"

on:
  # Cambiamos workflow_dispatch por repository_dispatch
  repository_dispatch:
    types: [add_project, add_phase, add_task]

permissions:
  contents: write

jobs:
  update-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Para GitOps, es mejor usar tu Secreto si vas a empujar cambios
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Engine
        # Importante: El payload que enviamos desde el JS llega en client_payload
        run: |
          python3 core/manage-projects.py \
          '${{ github.event.client_payload.data.name }}' \
          '${{ github.event.client_payload.data.uf }}' \
          '${{ github.event.client_payload.data.mora }}'

      - name: Sync Changes
        run: |
          git config --global user.name "System-Bot"
          git config --global user.email "bot@system.local"
          git add _data/project-schedule.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: remote update [${{ github.event.client_payload.data.name }}]" && git push)
