name: "System: Add Project Entry"

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nombre del recurso'
        required: true
      uf:
        description: 'Valor UF'
        required: true
      mora:
        description: 'Mora (%)'
        required: true

jobs:
  update-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Asegura que tengamos todo el historial para el push

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Este paso es para debug: te dirá en el log exactamente dónde están tus archivos
      - name: Verify Workspace
        run: |
          pwd
          ls -R

      - name: Run Engine
        run: |
          cd $GITHUB_WORKSPACE
          python3 core/manage_projects.py "${{ github.event.inputs.name }}" "${{ github.event.inputs.uf }}" "${{ github.event.inputs.mora }}"

      - name: Sync Changes
        run: |
          git config --global user.name "System-Bot"
          git config --global user.email "bot@system.local"
          git add _data/project-schedule.json
          # Solo hace commit si hay cambios reales para evitar que la Action falle
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: manual update [${{ github.event.inputs.name }}]" && git push)
