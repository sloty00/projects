name: "System: Add Project Entry"

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nombre del recurso'
        required: true
      uf:
        description: 'Valor UF'
        required: true
      mora:
        description: 'Mora (%)'
        required: true

# Otorga permisos de escritura al token automático de GitHub
permissions:
  contents: write

jobs:
  update-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Asegura que el checkout use el token con permisos
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Engine
        # Ejecuta el script con el nombre exacto: manage-projects.py
        run: |
          python3 core/manage-projects.py "${{ github.event.inputs.name }}" "${{ github.event.inputs.uf }}" "${{ github.event.inputs.mora }}"

      - name: Sync Changes
        run: |
          git config --global user.name "System-Bot"
          git config --global user.email "bot@system.local"
          # Añade el JSON actualizado
          git add _data/project-schedule.json
          # Solo hace commit y push si hay cambios detectados
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: manual update [${{ github.event.inputs.name }}]" && git push)
