name: "System: Add Project Entry"

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nombre del recurso'
        required: true
      uf:
        description: 'Valor UF'
        required: true
      mora:
        description: 'Mora (%)'
        required: true

jobs:
  update-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Engine
        run: python3 core/manage_projects.py "${{ github.event.inputs.name }}" "${{ github.event.inputs.uf }}" "${{ github.event.inputs.mora }}"
      - name: Sync Changes
        run: |
          git config --global user.name "System-Bot"
          git config --global user.email "bot@system.local"
          git add _data/project-schedule.json
          git commit -m "data: manual update [${{ github.event.inputs.name }}]"
          git push
