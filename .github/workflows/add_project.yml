name: Agregar Nuevo Proyecto

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nombre del Proyecto'
        required: true
      uf:
        description: 'Valor en UF'
        required: true
        default: '0.0'
      mora:
        description: 'Porcentaje de Mora'
        required: true
        default: '0.0'

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ejecutar Backend de Python
        run: |
          # Llamamos al script pasando los argumentos
          python3 core/manage_projects.py "${{ github.event.inputs.name }}" "${{ github.event.inputs.inputs.uf }}" "${{ github.event.inputs.mora }}"

      - name: Commit y Push de los cambios
        run: |
          git config --global user.name "Varto Bot"
          git config --global user.email "bot@varto.cl"
          git add _data/project-schedule.json
          git commit -m "update: nuevo proyecto agregado via Action [${{ github.event.inputs.name }}]"
          git push
