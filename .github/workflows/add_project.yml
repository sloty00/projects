name: "System: Add Project Entry"

on:
  # Escucha los eventos disparados desde el JavaScript del Dashboard
  repository_dispatch:
    types: [add_project, add_phase, add_task]

permissions:
  contents: write

jobs:
  update-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Se usa el secreto GITOPS_TOKEN configurado en Settings para poder hacer push
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Engine
        # Definimos el bloque ENV para que Python lea os.getenv('PAYLOAD')
        env:
          PAYLOAD: |
            {
              "action": "${{ github.event.event_type }}",
              "data": ${{ toJson(github.event.client_payload.data) }}
            }
        run: |
          python3 core/manage-projects.py

      - name: Sync Changes
        run: |
          git config --global user.name "System-Bot"
          git config --global user.email "bot@system.local"
          git add _data/project-schedule.json
          # Solo hace commit si hubo cambios reales en el JSON
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: remote update [${{ github.event.client_payload.data.name }}]" && git push)
