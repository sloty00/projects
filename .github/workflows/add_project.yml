name: "System: Manage Projects"

on:
  repository_dispatch:
    types: 
      - add_project
      - add_phase
      - add_task
      - edit_task
      - delete_task
      - delete_phase
      - delete_project

permissions:
  contents: write

jobs:
  update-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Se usa el secreto GITOPS_PROJECTS configurado en Settings para poder hacer push
          token: ${{ secrets.GITOPS_PROJECTS }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Engine
        # Inyectamos las variables limpias al entorno de Linux de forma independiente
        env:
          GITOPS_ACTION: ${{ github.event.action }}
          GITOPS_DATA: ${{ toJson(github.event.client_payload.data) }}
        run: |
          python3 core/manage-projects.py

      - name: Sync Changes
        run: |
          git config --global user.name "System-Bot"
          git config --global user.email "bot@system.local"
          git add _data/project-schedule.json
          # Verificamos si hay cambios antes de hacer commit
          if ! git diff --quiet; then
            git commit -m "data: remote update [${{ github.event.action }}]"
            git push
          fi
