<script>
/**
 * 1. CONFIGURACIÓN DE SEGURIDAD Y GITOPS
 */
// Intentamos recuperar el token del almacenamiento local
let GITHUB_TOKEN = localStorage.getItem('gitops_token');
const GITHUB_REPO = "tu-usuario/tu-repositorio"; // ACTUALIZA ESTO
const WORKFLOW_ID = "sync-projects.yml";         // Asegúrate que coincida con tu .yml

// Si no existe, lo solicitamos una única vez
if (!GITHUB_TOKEN) {
    GITHUB_TOKEN = prompt("🔑 Configuración GitOps:\nIngresa tu Personal Access Token o escribe 'DEMO' para probar la interfaz:");
    if (GITHUB_TOKEN) {
        localStorage.setItem('gitops_token', GITHUB_TOKEN);
    }
}

/**
 * 2. MOTOR DE ENVÍO A GITHUB (GITOPS)
 */
async function sendToGitOps(action, data) {
    // Manejo del Modo Demo para presentaciones o pruebas sin Token
    if (GITHUB_TOKEN && GITHUB_TOKEN.toUpperCase() === 'DEMO') {
        console.log("🛠️ MODO DEMO - Acción:", action, "Datos:", data);
        alert("✨ [MODO DEMO]\nInterfaz validada correctamente.\nEn una ejecución real, esto dispararía el script de Python en GitHub Actions.");
        closeAllModals();
        return;
    }

    if (!GITHUB_TOKEN) {
        alert("❌ Se requiere un Token para realizar cambios reales. Recarga la página.");
        return;
    }

    const url = `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`;
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                ref: 'main',
                inputs: {
                    payload: JSON.stringify({ action: action, data: data })
                }
            })
        });

        if (response.ok) {
            alert("🚀 Acción enviada a GitHub. El Dashboard se actualizará en breve.");
            closeAllModals();
        } else {
            const errorData = await response.json();
            alert("❌ Error de GitHub: " + (errorData.message || "No autorizado"));
        }
    } catch (error) {
        console.error("Error de conexión:", error);
        alert("❌ Error de red al intentar conectar con GitHub.");
    }
}

/**
 * 3. HANDLERS DE FORMULARIOS (MODALES)
 */
function submitProject() {
    const data = {
        name: document.getElementById('p-name').value,
        start: document.getElementById('p-start').value,
        end: document.getElementById('p-end').value
    };
    if (!data.name || !data.end) return alert("El nombre y la fecha de término son obligatorios.");
    sendToGitOps('add_project', data);
}

function submitPhase() {
    const data = {
        project_name: document.getElementById('phase-target-project').value,
        phase_name: document.getElementById('phase-name').value
    };
    if (!data.phase_name) return alert("El nombre de la fase es obligatorio.");
    sendToGitOps('add_phase', data);
}

function submitTask() {
    const data = {
        project_name: document.getElementById('task-target-project').value,
        phase_name: document.getElementById('task-target-phase').value,
        task_name: document.getElementById('task-name').value,
        hh: parseFloat(document.getElementById('task-hh').value) || 0,
        status: document.getElementById('task-status').value
    };
    if (!data.task_name) return alert("La descripción de la tarea es obligatoria.");
    sendToGitOps('add_task', data);
}

/**
 * 4. LÓGICA DE RENDERIZADO Y CÁLCULOS (DOM)
 */
document.addEventListener("DOMContentLoaded", function() {
    const projects = document.querySelectorAll('.project-block');

    projects.forEach(project => {
        const endDateStr = project.getAttribute('data-end');
        const valorReferenciaUF = parseFloat(project.getAttribute('data-valor-uf')) || 38000;
        const tasaCobro = parseFloat(project.getAttribute('data-tasa')) || 0.25;
        
        let totalHH = 0;
        let totalPhasesProgress = 0;
        let phases = project.querySelectorAll('.phase-container');

        // Cálculo de Tiempo restante
        if (endDateStr) {
            const end = new Date(endDateStr);
            const today = new Date();
            const diffTime = end - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const daysDiv = project.querySelector('.js-days-diff');
            if (daysDiv) {
                daysDiv.innerText = `${diffDays} días ${diffDays >= 0 ? 'libres' : 'adeudados'}`;
                daysDiv.style.color = diffDays >= 0 ? "#00ff88" : "#ff4d4d";
            }
        }

        // Cálculo de Fases, HH y Progreso
        phases.forEach(phase => {
            const tasks = phase.querySelectorAll('.task-item');
            let phaseHH = 0;
            let phaseDone = 0;

            tasks.forEach(task => {
                const hh = parseFloat(task.getAttribute('data-hh')) || 0;
                const status = (task.getAttribute('data-status') || "").toLowerCase();
                
                phaseHH += hh;
                if (status === 'completada') phaseDone++;
            });

            const phaseProgress = tasks.length > 0 ? (phaseDone / tasks.length) * 100 : 0;
            const phaseLabel = phase.querySelector('.js-phase-progress');
            if (phaseLabel) phaseLabel.innerText = `${Math.round(phaseProgress)}%`;
            
            totalHH += phaseHH;
            totalPhasesProgress += phaseProgress;
        });

        // Matemática Financiera
        const totalUF = (totalHH * tasaCobro).toFixed(2);
        const totalCLP = Math.round(totalUF * valorReferenciaUF);
        const globalProgress = phases.length > 0 ? Math.round(totalPhasesProgress / phases.length) : 0;

        // Inyección de Resultados en el Dashboard
        if (project.querySelector('.js-total-uf')) project.querySelector('.js-total-uf').innerText = `${totalUF} UF`;
        if (project.querySelector('.js-total-clp')) project.querySelector('.js-total-clp').innerText = `$${totalCLP.toLocaleString('es-CL')} CLP`;
        if (project.querySelector('.js-total-hh')) project.querySelector('.js-total-hh').innerText = `${totalHH} H/H registradas`;
        if (project.querySelector('.js-global-progress')) project.querySelector('.js-global-progress').innerText = `${globalProgress}%`;
        
        const progressBar = project.querySelector('.js-progress-bar');
        if (progressBar) progressBar.style.width = `${globalProgress}%`;
    });
});

/**
 * 5. UTILIDADES
 */
function closeAllModals() {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
}

// Para resetear el token desde consola si te equivocas: resetToken()
function resetToken() {
    localStorage.removeItem('gitops_token');
    location.reload();
}
</script>
