<!-- Estilos para los Modales (Corregidos para centrado y desenfoque) -->
<style>
    /* Contenedor principal que cubre toda la pantalla */
    .modal {
        display: none; 
        position: fixed; 
        z-index: 10000; /* Asegura estar por encima del Dashboard */
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px); /* Efecto Glassmorphism de fondo */
    }

    /* Caja de contenido del modal */
    .modal-content {
        background: #111;
        margin: 8% auto; /* Centrado vertical aproximado */
        padding: 2.5rem;
        border: 1px solid #00d4ff;
        border-radius: 20px;
        width: 90%;
        max-width: 480px;
        box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
        color: white;
        position: relative;
    }

    .modal-content h3 { 
        color: #00d4ff; 
        margin-top: 0; 
        font-size: 1.5rem;
        border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        padding-bottom: 1rem;
        margin-bottom: 1.5rem;
    }

    /* Estilos de formulario interno */
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    
    .form-group input, .form-group select {
        width: 100%;
        padding: 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        color: white;
        font-family: inherit;
        font-size: 0.9rem;
    }

    .form-group input:focus {
        outline: none;
        border-color: #00d4ff;
        background: #222;
    }

    /* Footer y Botones */
    .modal-footer { 
        display: flex; 
        justify-content: flex-end; 
        gap: 12px; 
        margin-top: 2.5rem; 
    }

    .btn-save { 
        background: #00ff88; 
        color: #000; 
        border: none; 
        padding: 12px 24px; 
        border-radius: 8px; 
        font-weight: bold; 
        cursor: pointer; 
        transition: transform 0.2s;
    }
    .btn-save:hover { transform: scale(1.05); background: #00e67a; }

    .btn-cancel { 
        background: transparent; 
        color: #ff4d4d; 
        border: 1px solid #ff4d4d; 
        padding: 10px 24px; 
        border-radius: 8px; 
        cursor: pointer; 
        transition: opacity 0.2s;
    }
    .btn-cancel:hover { opacity: 0.7; }
</style>

<!-- MODAL 1: NUEVO PROYECTO -->
<div id="projectModal" class="modal">
    <div class="modal-content">
        <h3>🚀 Crear Nuevo Proyecto</h3>
        <div class="form-group">
            <label>Nombre del Proyecto</label>
            <input type="text" id="p-name" placeholder="Ej: Optimización DB">
        </div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Fecha Inicio</label>
                <input type="date" id="p-start">
            </div>
            <div>
                <label>Fecha Fin</label>
                <input type="date" id="p-end">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('projectModal')">Cancelar</button>
            <button class="btn-save" onclick="submitProject()">Crear Proyecto</button>
        </div>
    </div>
</div>

<!-- MODAL 2: AGREGAR FASE -->
<div id="phaseModal" class="modal">
    <div class="modal-content">
        <h3>🏗️ Nueva Fase</h3>
        <p id="target-project-label" style="font-size: 0.8rem; color: #00d4ff; margin-bottom: 1rem;"></p>
        <input type="hidden" id="phase-target-project">
        <div class="form-group">
            <label>Nombre de la Fase</label>
            <input type="text" id="phase-name" placeholder="Ej: Testing QA">
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('phaseModal')">Cancelar</button>
            <button class="btn-save" onclick="submitPhase()">Añadir Fase</button>
        </div>
    </div>
</div>

<!-- MODAL 3: AGREGAR TAREA -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3>📝 Nueva Tarea</h3>
        <p id="target-task-label" style="font-size: 0.7rem; color: #888; margin-bottom: 1rem;"></p>
        <input type="hidden" id="task-target-project">
        <input type="hidden" id="task-target-phase">
        
        <div class="form-group">
            <label>Descripción de Tarea</label>
            <input type="text" id="task-name" placeholder="Ej: Revisión de logs">
        </div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Horas (HH)</label>
                <input type="number" id="task-hh" value="0" step="0.5">
            </div>
            <div>
                <label>Estado Inicial</label>
                <select id="task-status">
                    <option value="en proceso">EN PROCESO</option>
                    <option value="completada">COMPLETADA</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('taskModal')">Cancelar</button>
            <button class="btn-save" onclick="submitTask()">Añadir Tarea</button>
        </div>
    </div>
</div>

<script>
    // 1. Apertura y Cierre Simple
    function openModal(id) { 
        document.getElementById(id).style.display = 'block'; 
    }
    
    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
    }

    // 2. Inyección de Contexto
    function openPhaseModal(projectName) {
        document.getElementById('phase-target-project').value = projectName;
        document.getElementById('target-project-label').innerText = `Añadiendo a: ${projectName}`;
        openModal('phaseModal');
    }

    function openTaskModal(projectName, phaseName) {
        document.getElementById('task-target-project').value = projectName;
        document.getElementById('task-target-phase').value = phaseName;
        document.getElementById('target-task-label').innerText = `Destino: ${projectName} > ${phaseName}`;
        openModal('taskModal');
    }

    // 3. Cierre por clic exterior
    window.onclick = function(event) {
        if (event.target.className === 'modal') {
            event.target.style.display = "none";
        }
    }
</script>
