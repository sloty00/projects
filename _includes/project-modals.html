<style>
    .modal {
        display: none; 
        position: fixed; 
        z-index: 10000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
    }

    .modal-content {
        background: #111;
        margin: 8% auto;
        padding: 2.5rem;
        border: 1px solid #00d4ff;
        border-radius: 20px;
        width: 90%;
        max-width: 480px;
        box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
        color: white;
        position: relative;
    }

    .modal-content h3 { 
        color: #00d4ff; 
        margin-top: 0; 
        font-size: 1.5rem;
        border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        padding-bottom: 1rem;
        margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    
    .form-group input, .form-group select {
        width: 100%;
        padding: 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        color: white;
        font-family: inherit;
        font-size: 0.9rem;
    }

    .form-group input:focus {
        outline: none;
        border-color: #00d4ff;
        background: #222;
    }

    .modal-footer { 
        display: flex; 
        justify-content: flex-end; 
        gap: 12px; 
        margin-top: 2.5rem; 
    }

    .btn-save { 
        background: #00ff88; 
        color: #000; 
        border: none; 
        padding: 12px 24px; 
        border-radius: 8px; 
        font-weight: bold; 
        cursor: pointer; 
        transition: transform 0.2s;
    }
    .btn-save:hover { transform: scale(1.05); background: #00e67a; }

    .btn-cancel { 
        background: transparent; 
        color: #aaa; 
        border: 1px solid #333; 
        padding: 10px 24px; 
        border-radius: 8px; 
        cursor: pointer; 
    }

    .btn-delete {
        background: transparent;
        color: #ff4d4d;
        border: 1px solid #ff4d4d;
        padding: 10px 24px;
        border-radius: 8px;
        cursor: pointer;
        margin-right: auto; /* Empuja al inicio */
    }
    .btn-delete:hover { background: #ff4d4d; color: white; }
</style>

<!-- Modales simplificados para creación -->
<div id="projectModal" class="modal">
    <div class="modal-content">
        <h3>🚀 Crear Nuevo Proyecto</h3>
        <div class="form-group"><label>Nombre</label><input type="text" id="p-name"></div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Inicio</label><input type="date" id="p-start"></div>
            <div><label>Fin</label><input type="date" id="p-end"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('projectModal')">Cancelar</button>
            <button class="btn-save" onclick="submitProject()">Crear</button>
        </div>
    </div>
</div>

<div id="phaseModal" class="modal">
    <div class="modal-content">
        <h3>🏗️ Nueva Fase</h3>
        <input type="hidden" id="phase-target-project">
        <div class="form-group"><label>Nombre de la Fase</label><input type="text" id="phase-name"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('phaseModal')">Cancelar</button>
            <button class="btn-save" onclick="submitPhase()">Añadir</button>
        </div>
    </div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3>📝 Nueva Tarea</h3>
        <input type="hidden" id="task-target-project">
        <input type="hidden" id="task-target-phase">
        <div class="form-group"><label>Descripción</label><input type="text" id="task-name"></div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Horas (HH)</label><input type="number" id="task-hh" value="0" step="0.5"></div>
            <div><label>Estado</label><select id="task-status"><option value="en proceso">En Proceso</option><option value="completada">Completada</option></select></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('taskModal')">Cancelar</button>
            <button class="btn-save" onclick="submitTask()">Añadir</button>
        </div>
    </div>
</div>

<!-- Modal de edición con botón eliminar -->
<div id="editTaskModal" class="modal">
    <div class="modal-content">
        <h3>✏️ Editar Tarea</h3>
        <input type="hidden" id="edit-task-project">
        <input type="hidden" id="edit-task-phase">
        <input type="hidden" id="edit-task-original-name">
        <div class="form-group"><label>Descripción</label><input type="text" id="edit-task-name"></div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Horas</label><input type="number" id="edit-task-hh" step="0.5"></div>
            <div><label>Estado</label><select id="edit-task-status"><option value="en proceso">En Proceso</option><option value="completada">Completada</option></select></div>
        </div>
        <div class="modal-footer">
            <button class="btn-delete" onclick="handleDeleteTask()">Eliminar Tarea</button>
            <button class="btn-cancel" onclick="closeModal('editTaskModal')">Cancelar</button>
            <button class="btn-save" onclick="submitEditTask()">Guardar</button>
        </div>
    </div>
</div>

<script>
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function openPhaseModal(p) { document.getElementById('phase-target-project').value = p; openModal('phaseModal'); }
    
    function openTaskModal(p, ph) { 
        document.getElementById('task-target-project').value = p; 
        document.getElementById('task-target-phase').value = ph; 
        openModal('taskModal'); 
    }

    function openEditTaskModal(p, ph, name, hh, status) {
        document.getElementById('edit-task-project').value = p;
        document.getElementById('edit-task-phase').value = ph;
        document.getElementById('edit-task-original-name').value = name;
        document.getElementById('edit-task-name').value = name;
        document.getElementById('edit-task-hh').value = hh;
        document.getElementById('edit-task-status').value = status.toLowerCase();
        openModal('editTaskModal');
    }

    function handleDeleteTask() {
        const p = document.getElementById('edit-task-project').value;
        const ph = document.getElementById('edit-task-phase').value;
        const name = document.getElementById('edit-task-original-name').value;
        deleteTask(p, ph, name);
    }

    window.onclick = function(event) {
        if (event.target.className === 'modal') event.target.style.display = "none";
    }
</script>
